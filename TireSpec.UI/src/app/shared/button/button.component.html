<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  [class]="'custom-btn ' + variant() + (fullWidth() ? ' full-width' : '') + (iconOnly() ? ' icon-only' : '')"
  (click)="onClick($event)"
>
  @if (loading()) {
    <mat-spinner diameter="18" class="btn-spinner"></mat-spinner>
  } @else {
    @if (icon()) {
      <mat-icon class="btn-icon">{{ icon() }}</mat-icon>
    }
    @if (!iconOnly()) {
      <span class="btn-label">
        <ng-content></ng-content>
      </span>
    }
  }
</button>
