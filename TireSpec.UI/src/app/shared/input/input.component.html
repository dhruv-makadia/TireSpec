<mat-form-field appearance="outline" class="custom-form-field">
  <mat-label>{{ label() }}</mat-label>
  <input
    matInput
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  @if (control && control.invalid && (control.dirty || control.touched)) {
    <mat-error>{{ getErrorMessage() }}</mat-error>
  }
</mat-form-field>
