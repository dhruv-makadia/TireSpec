<h2 mat-dialog-title class="dialog-title">Enter Tire Data Manually</h2>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="form" class="manual-form">
    <div class="form-row">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Brand</mat-label>
        <input matInput formControlName="brand" placeholder="e.g. Michelin" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Model</mat-label>
        <input matInput formControlName="model" placeholder="e.g. Defender" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="form-field full-width">
      <mat-label>Tire Size</mat-label>
      <input matInput formControlName="tireSize" placeholder="e.g. 225/60R17" />
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>DOT Code</mat-label>
        <input matInput formControlName="dotCode" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>DOT Year</mat-label>
        <input matInput formControlName="dotYear" placeholder="e.g. 2024" />
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Load Index</mat-label>
        <input matInput formControlName="loadIndex" placeholder="e.g. 99" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Speed Rating</mat-label>
        <input matInput formControlName="speedRating" placeholder="e.g. H" />
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="submit()">
    Submit
  </button>
</mat-dialog-actions>
